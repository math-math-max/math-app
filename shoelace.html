<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoelace公式の証明</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; font-family: Georgia, serif;
    padding: 24px 16px;
  }
  h1 { color: #e2c97e; font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 4px; text-align:center;}
  .subtitle { color: #aaa; font-size: 0.8rem; margin-bottom: 20px; text-align:center;}
  .svg-wrap {
    background: rgba(255,255,255,0.05);
    border-radius: 16px; padding: 12px;
    margin-bottom: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .btn-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center;}
  button {
    padding: 8px 14px; border-radius: 8px; border: 2px solid;
    cursor: pointer; font-weight: bold; font-size: 0.82rem;
    transition: all 0.2s; background: transparent;
  }
  .card {
    width: 100%; max-width: 360px;
    border: 2px solid #555; border-radius: 12px;
    padding: 16px 18px; color: white; min-height: 100px;
    transition: all 0.3s; background: rgba(255,255,255,0.07);
  }
  .card-title { font-weight: bold; margin-bottom: 8px; font-size: 1rem; }
  .card-body { color: #ccc; font-size: 0.88rem; line-height: 1.8; }
  .formula { color: #e2c97e; font-family: monospace; font-size: 0.95rem; }
</style>
</head>
<body>

<h1>Shoelace公式の証明</h1>
<p class="subtitle">大きな長方形から余分を引く！</p>

<div class="svg-wrap">
  <svg id="fig" width="320" height="280" viewBox="0 0 320 280"></svg>
</div>

<div class="btn-row">
  <button id="btn0" onclick="setStep(0)" style="border-color:#666;color:#666;">最初</button>
  <button id="btn1" onclick="setStep(1)" style="border-color:#2196F3;color:#2196F3;">Step 1</button>
  <button id="btn2" onclick="setStep(2)" style="border-color:#FF9800;color:#FF9800;">Step 2</button>
  <button id="btn3" onclick="setStep(3)" style="border-color:#4CAF50;color:#4CAF50;">Step 3</button>
</div>

<div class="card" id="card">
  <div class="card-title" style="color:#e2c97e;">証明の方針</div>
  <div class="card-body">
    3頂点A・B・Cを含む<b style="color:#2196F3">大きな長方形</b>を作り、<br>
    余分な部分を引いて△ABCの面積を求める！<br><br>
    「Step 1 → 2 → 3」と進めてみよう 👇
  </div>
</div>

<script>
const A = {x:130, y:45};
const B = {x:35,  y:215};
const C = {x:275, y:175};

const pad = 18;
const minX = Math.min(A.x,B.x,C.x)-pad;
const maxX = Math.max(A.x,B.x,C.x)+pad;
const minY = Math.min(A.y,B.y,C.y)-pad;
const maxY = Math.max(A.y,B.y,C.y)+pad;

const axisY = 255;
const axisX = 15;

const cards = [
  {
    title: '証明の方針',
    titleColor: '#e2c97e',
    borderColor: '#555',
    html: `3頂点A・B・Cを含む<b style="color:#2196F3">大きな長方形</b>を作り、<br>余分な部分を引いて△ABCの面積を求める！<br><br>「Step 1 → 2 → 3」と進めてみよう 👇`
  },
  {
    title: 'Step 1：長方形で囲む',
    titleColor: '#2196F3',
    borderColor: '#2196F3',
    html: `3頂点をすべて含む<b style="color:#2196F3">青い長方形</b>を作る。<br><br>
    <span class="formula">長方形の面積<br>= (x₃－x₂) × y₁</span>`
  },
  {
    title: 'Step 2：余分を引く',
    titleColor: '#FF9800',
    borderColor: '#FF9800',
    html: `長方形から<b style="color:#FF9800">オレンジの三角形</b>と<b style="color:#FF5722">赤い台形</b>を引く！<br><br>
    <span class="formula">S△ ＝ 長方形<br>　　－ 左の三角形<br>　　－ 右の三角形<br>　　－ 下の台形</span>`
  },
  {
    title: 'Step 3：整理するとたすき掛けに！',
    titleColor: '#4CAF50',
    borderColor: '#4CAF50',
    html: `展開・整理すると…<br><br>
    <span class="formula">S = ½|x₁(y₂－y₃)<br>　　＋ x₂(y₃－y₁)<br>　　＋ x₃(y₁－y₂)|</span><br><br>
    これが <b style="color:#e2c97e">Shoelace公式</b>！ ✓`
  }
];

function svgEl(tag, attrs, parent) {
  const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  if (parent) parent.appendChild(el);
  return el;
}

function setStep(n) {
  const svg = document.getElementById('fig');
  svg.innerHTML = '';

  // grid
  for (let i=0;i<7;i++) svgEl('line',{x1:i*50+10,y1:5,x2:i*50+10,y2:270,stroke:'rgba(255,255,255,0.05)',strokeWidth:1},svg);
  for (let i=0;i<6;i++) svgEl('line',{x1:5,y1:i*50+5,x2:315,y2:i*50+5,stroke:'rgba(255,255,255,0.05)',strokeWidth:1},svg);

  // Step1: rectangle
  if (n >= 1) {
    svgEl('rect',{x:minX,y:minY,width:maxX-minX,height:maxY-minY,
      fill:'rgba(33,150,243,0.1)',stroke:'#2196F3',strokeWidth:2,strokeDasharray:'6,3',rx:3},svg);
  }

  // Step2: corner triangles & trapezoid
  if (n >= 2) {
    // top-left triangle (near A)
    svgEl('polygon',{
      points:`${minX},${minY} ${A.x},${minY} ${A.x},${A.y}`,
      fill:'rgba(255,152,0,0.3)',stroke:'#FF9800',strokeWidth:1.5,strokeDasharray:'4,2'
    },svg);
    // top-right triangle (near C)
    svgEl('polygon',{
      points:`${C.x},${minY} ${maxX},${minY} ${maxX},${C.y} ${C.x},${C.y}`,
      fill:'rgba(255,152,0,0.3)',stroke:'#FF9800',strokeWidth:1.5,strokeDasharray:'4,2'
    },svg);
    // bottom trapezoid (near B and C bottom)
    svgEl('polygon',{
      points:`${minX},${B.y} ${B.x},${B.y} ${C.x},${C.y} ${maxX},${C.y} ${maxX},${maxY} ${minX},${maxY}`,
      fill:'rgba(255,87,34,0.25)',stroke:'#FF5722',strokeWidth:1.5,strokeDasharray:'4,2'
    },svg);
  }

  // Main triangle
  svgEl('polygon',{
    points:`${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}`,
    fill:'rgba(226,201,126,0.18)',stroke:'#e2c97e',strokeWidth:2.5
  },svg);

  // dotted projection lines
  for (const pt of [A,B,C]) {
    svgEl('line',{x1:pt.x,y1:pt.y,x2:pt.x,y2:axisY,stroke:'rgba(255,255,255,0.18)',strokeWidth:1,strokeDasharray:'3,3'},svg);
    svgEl('line',{x1:pt.x,y1:pt.y,x2:axisX,y2:pt.y,stroke:'rgba(255,255,255,0.18)',strokeWidth:1,strokeDasharray:'3,3'},svg);
  }

  // axes
  svgEl('line',{x1:axisX,y1:axisY,x2:310,y2:axisY,stroke:'rgba(255,255,255,0.35)',strokeWidth:1.5},svg);
  svgEl('line',{x1:axisX,y1:5,x2:axisX,y2:265,stroke:'rgba(255,255,255,0.35)',strokeWidth:1.5},svg);

  // Step3: circle arrows on triangle
  if (n >= 3) {
    for (const [p1,p2] of [[A,B],[B,C],[C,A]]) {
      svgEl('line',{x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,stroke:'#4CAF50',strokeWidth:2.5,
        markerEnd:'url(#arrowG)',opacity:0.85},svg);
    }
    const defs = svgEl('defs',{},svg);
    const marker = svgEl('marker',{id:'arrowG',markerWidth:'8',markerHeight:'8',refX:'6',refY:'3',orient:'auto'},defs);
    svgEl('path',{d:'M0,0 L0,6 L8,3 z',fill:'#4CAF50'},marker);
  }

  // Vertices
  const pts = [{p:A,label:'A(x₁,y₁)',col:'#e74c3c',dx:-15,dy:-14},
                {p:B,label:'B(x₂,y₂)',col:'#3498db',dx:-70,dy:18},
                {p:C,label:'C(x₃,y₃)',col:'#2ecc71',dx:10,dy:16}];
  for (const {p,label,col,dx,dy} of pts) {
    svgEl('circle',{cx:p.x,cy:p.y,r:7,fill:col,stroke:'white',strokeWidth:2},svg);
    const t = svgEl('text',{x:p.x+dx,y:p.y+dy,fill:col,'font-size':'12','font-weight':'bold'},svg);
    t.textContent = label;
  }

  // Update card
  const c = cards[n];
  const card = document.getElementById('card');
  card.style.borderColor = c.borderColor;
  card.innerHTML = `<div class="card-title" style="color:${c.titleColor}">${c.title}</div>
    <div class="card-body">${c.html}</div>`;

  // Update button styles
  const colors = ['#666','#2196F3','#FF9800','#4CAF50'];
  for (let i=0;i<4;i++) {
    const btn = document.getElementById('btn'+i);
    btn.style.background = (i===n) ? colors[i] : 'transparent';
    btn.style.color = (i===n) ? 'white' : colors[i];
    btn.style.borderColor = colors[i];
  }
}

setStep(0);
</script>
</body>
</html>
